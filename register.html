<!DOCTYPE html>
<html>
<head>
<title>Science Fair Registration</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

form{
background:white;
width:400px;
margin:auto;
margin-top:40px;
padding:25px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
font-size:16px;
border-radius:5px;
}

h2{
text-align:center;
}

</style>

</head>

<body>

<form>

<h2>Science Fair Registration</h2>

<input type="text" placeholder="School Name" required>

<input type="text" placeholder="Student Name" required>

<input type="text" placeholder="Father's Name" required>

<input type="text" placeholder="Mother's Name" required>

<input type="tel" placeholder="Phone Number" required>

<input type="number" placeholder="Grade" required>

<input type="email" placeholder="Email Address" required>

<label>Upload Bank Payment Receipt:</label>
<input type="file" required>

<br><br>

<button type="submit">Submit Registration</button>

</form>

</body>
</html>
